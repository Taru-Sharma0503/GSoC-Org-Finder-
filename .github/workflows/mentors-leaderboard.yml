name: 🏆 Mentor Leaderboard

on:
  pull_request_review:
    types:
      - submitted

  pull_request_target:
    types:
      - closed

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: mentor-leaderboard
  cancel-in-progress: false

jobs:
  update-mentor-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Mentor Leaderboard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // -----------------------------
            // Mentor List
            // -----------------------------
            const mentors = {
              reviewers: [
                "12fahed",
                "4f4d",
                "aanjalii01",
                "adithyan-css",
                "AditthyaSS",
                "AnirbansarkarS",
                "AnirudhPhophalia",
                "anubhavxdev",
                "Anushreebasics",
                "aryanbhutani26",
                "arzoo0511",
                "ayu-yishu13",
                "Ayush-Patel-56",
                "Ayushh-Sharmaa",
                "Balaji91221",
                "BandhiyaHardik",
                "coder-zs-cse",
                "CoderOggy78",
                "deepak0x",
                "deepaksinghh12",
                "DevROHIT11",
                "Haile-12",
                "harxhe",
                "itsdakshjain",
                "JoeCelaster",
                "kallal79",
                "KaranGupta2005",
                "knoxiboy",
                "Kota-Jagadeesh",
                "kpj2006",
                "KUMARNiru007",
                "lourduradjou",
                "lovestaco",
                "magic-peach",
                "Manan-Chawla",
                "Maxd646",
                "MAYANKSHARMA01010",
                "Mohit-368",
                "morningstarxcdcode",
                "Mrigakshi-Rathore",
                "MUKUL-PRASAD-SIGH",
                "Neilblaze",
                "nihalawasthi",
                "nirvik34",
                "nitinog10",
                "oasis-parzival",
                "piyushdotcomm",
                "Precise-Goals",
                "preetbiswas12",
                "rounakkraaj-1744",
                "sabeenaviklar",
                "Sagar-Datkhile",
                "Satya900",
                "saurabh24thakur",
                "Shravanthi20",
                "sparshagarwal0411",
                "SparshM8",
                "stealthwhizz",
                "subratamondalnsec",
                "Suvanwita",
                "SyedImtiyaz-1",
                "TarunyaProgrammer",
                "thakurutkarsh22",
                "uddalak2005",
                "UltraBot05",
                "vanshaggarwal07"
              ]
            };

            const mentorSet = new Set(
              mentors.reviewers.map(m => m.toLowerCase())
            );

            // -----------------------------
            // Review Scoring
            // -----------------------------
            const REVIEW_POINTS = {
              APPROVED: 5,
              CHANGES_REQUESTED: 4,
              COMMENTED: 2
            };

            // -----------------------------
            // Init Stats
            // -----------------------------
            const stats = {};

            for (const mentor of mentors.reviewers) {
              stats[mentor] = {
                approved: 0,
                changes_requested: 0,
                commented: 0,
                merged_reviews: 0,
                score: 0
              };
            }

            // -----------------------------
            // Fetch PRs
            // -----------------------------
            core.info('Fetching closed pull requests...');

            const pulls = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'closed',
                per_page: 100
              }
            );

            const mergedPRs = pulls.filter(pr => pr.merged_at);

            core.info(`Found ${mergedPRs.length} merged PRs`);

            // -----------------------------
            // Process PR Reviews
            // -----------------------------
            for (const pr of mergedPRs) {
              try {

                const reviews = await github.paginate(
                  github.rest.pulls.listReviews,
                  {
                    owner,
                    repo,
                    pull_number: pr.number,
                    per_page: 100
                  }
                );

                // latest review per mentor
                const latestReviewByMentor = new Map();

                for (const review of reviews) {

                  if (!review.user || !review.user.login) {
                    continue;
                  }

                  const reviewer = review.user.login;

                  // ignore self review
                  if (
                    reviewer.toLowerCase() ===
                    pr.user.login.toLowerCase()
                  ) {
                    continue;
                  }

                  // only mentors
                  if (
                    !mentorSet.has(reviewer.toLowerCase())
                  ) {
                    continue;
                  }

                  // ignore dismissed reviews
                  if (
                    review.state === 'DISMISSED'
                  ) {
                    continue;
                  }

                  const existing =
                    latestReviewByMentor.get(
                      reviewer.toLowerCase()
                    );

                  if (
                    !existing ||
                    new Date(review.submitted_at) >
                    new Date(existing.submitted_at)
                  ) {
                    latestReviewByMentor.set(
                      reviewer.toLowerCase(),
                      review
                    );
                  }
                }

                // -----------------------------
                // Score Reviews
                // -----------------------------
                for (const review of latestReviewByMentor.values()) {

                  const reviewer = review.user.login;
                  const state = review.state;

                  if (!stats[reviewer]) {
                    stats[reviewer] = {
                      approved: 0,
                      changes_requested: 0,
                      commented: 0,
                      merged_reviews: 0,
                      score: 0
                    };
                  }

                  if (state === 'APPROVED') {
                    stats[reviewer].approved++;
                  }
                  else if (state === 'CHANGES_REQUESTED') {
                    stats[reviewer].changes_requested++;
                  }
                  else {
                    stats[reviewer].commented++;
                  }

                  stats[reviewer].merged_reviews++;

                  stats[reviewer].score +=
                    REVIEW_POINTS[state] || 1;
                }

              } catch (error) {
                core.warning(
                  `Failed processing PR #${pr.number}: ${error.message}`
                );
              }
            }

            // -----------------------------
            // Sort Leaderboard
            // -----------------------------
            const leaderboard = Object.entries(stats)
              .sort((a, b) => {

                if (
                  b[1].score !== a[1].score
                ) {
                  return b[1].score - a[1].score;
                }

                return (
                  b[1].merged_reviews -
                  a[1].merged_reviews
                );
              });

            // -----------------------------
            // Generate Markdown
            // -----------------------------
            let markdown =
              '# 🏆 GSSOC Mentor Leaderboard\n\n';

            markdown +=
              '> Tracks mentor reviews and mentoring activity across merged pull requests.\n\n';

            markdown +=
              '| Rank | Mentor | Approved | Changes Requested | Comments | Total Reviews | Score |\n';

            markdown +=
              '|------|--------|-----------|-------------------|----------|----------------|-------|\n';

            leaderboard.forEach(
              ([mentor, data], index) => {

                markdown +=
                  `| ${index + 1} | @${mentor} | ${data.approved} | ${data.changes_requested} | ${data.commented} | ${data.merged_reviews} | ${data.score} |\n`;
              }
            );

            markdown += '\n';
            markdown +=
              `Last updated: ${new Date().toUTCString()}\n`;

            markdown += '\n';
            markdown += '## 🎯 Scoring System\n\n';
            markdown += '- APPROVED review → +5 points\n';
            markdown += '- CHANGES_REQUESTED review → +4 points\n';
            markdown += '- COMMENTED review → +2 points\n';

            // -----------------------------
            // Save Files
            // -----------------------------
            fs.writeFileSync(
              '.github/reviewers/mentor-leaderboard.md',
              markdown
            );

            fs.writeFileSync(
              '.github/reviewers/mentor-stats.json',
              JSON.stringify(stats, null, 2)
            );

            core.info(
              'Mentor leaderboard generated successfully'
            );

      - name: Commit leaderboard updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/reviewers/mentor-leaderboard.md
          git add .github/reviewers/mentor-stats.json

          git diff --cached --quiet && exit 0

          git commit -m "chore: update mentor leaderboard"
          git push